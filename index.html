<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Ops</title>
    <style>
        :root {
            --bg-color: #0d1117; 
            --header-bg: #161b22;
            --border-color: #30363d;
            --msg-bg: #21262d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --color-rodrigo: #58a6ff; 
            --color-noelia: #bc8cff;  
            --status-online: #2ea043;
            --status-away: #d29922; /* Amarillo/Naranja oscuro */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; height: 100vh; position: relative; }
        
        .chat-container { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); position: relative;}
        
        .header { background-color: var(--header-bg); border-bottom: 1px solid var(--border-color); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .title-area { display: flex; flex-direction: column; }
        .main-title { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        
        /* Indicador de estado */
        .status-bar { font-size: 0.7rem; margin-top: 4px; display: flex; gap: 10px; }
        .status-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background-color: #484f58; transition: all 0.3s;}
        .dot.active { background-color: var(--status-online); box-shadow: 0 0 5px var(--status-online); }
        .dot.away { background-color: var(--status-away); box-shadow: 0 0 5px var(--status-away); }
        
        .user-selector { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; outline: none; font-size: 0.85rem; }
        
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .message { max-width: 85%; padding: 10px 12px; background-color: var(--msg-bg); position: relative; word-wrap: break-word; font-size: 0.95rem; border: 1px solid var(--border-color); border-left-width: 4px; }
        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }
        
        .message[data-sender="Rodrigo"] { border-left-color: var(--color-rodrigo); }
        .message[data-sender="Noelia"] { border-left-color: var(--color-noelia); }
        
        .msg-sender { font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .message[data-sender="Rodrigo"] .msg-sender { color: var(--color-rodrigo); }
        .message[data-sender="Noelia"] .msg-sender { color: var(--color-noelia); }
        
        .msg-time { font-size: 0.65rem; opacity: 0.5; text-align: right; margin-top: 6px; display: block; }
        
        /* Controles inferiores */
        .input-area { background: var(--header-bg); border-top: 1px solid var(--border-color); padding: 10px 15px; display: flex; gap: 8px; align-items: center; position: relative;}
        .input-area input { flex: 1; padding: 10px 15px; background-color: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); outline: none; font-size: 0.95rem; border-radius: 4px;}
        
        .btn-action { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); width: 40px; height: 40px; cursor: pointer; display: flex; justify-content: center; align-items: center; border-radius: 4px; transition: 0.2s;}
        .btn-action:hover { background-color: var(--bg-color); color: var(--text-main); }
        .btn-action svg { width: 18px; height: 18px; fill: currentColor; }
        .btn-emoji { font-size: 1.2rem; }

        /* Panel de Emojis */
        .emoji-picker { display: none; position: absolute; bottom: 65px; right: 15px; background: var(--header-bg); border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; grid-template-columns: repeat(6, 1fr); gap: 8px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); z-index: 100;}
        .emoji-picker.show { display: grid; }
        .emoji-picker span { cursor: pointer; font-size: 1.3rem; text-align: center; transition: transform 0.1s; user-select: none;}
        .emoji-picker span:hover { transform: scale(1.2); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="title-area">
            <div class="main-title">System Log_</div>
            <div class="status-bar">
                <div class="status-item"><div class="dot" id="dot-Rodrigo"></div>R: <span id="txt-Rodrigo">Off</span></div>
                <div class="status-item"><div class="dot" id="dot-Noelia"></div>N: <span id="txt-Noelia">Off</span></div>
            </div>
        </div>
        <div>
            <button onclick="requestNotificationPermission()" style="background:none; border:1px solid #30363d; color:#c9d1d9; padding:3px 6px; margin-right:5px; cursor:pointer; font-size:0.7rem; border-radius:3px;">🔔 Alertas</button>
            <select id="currentUser" class="user-selector">
                <option value="Rodrigo">Rodrigo</option>
                <option value="Noelia">Noelia</option>
            </select>
        </div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <button class="btn-action btn-emoji" onclick="toggleEmojiPicker()" title="Insertar Emoji">☺</button>
        <input type="text" id="messageInput" placeholder=">_ Ingresar comando..." autocomplete="off" onkeypress="handleKeyPress(event)">
        <button class="btn-action" onclick="sendMessage()" title="Ejecutar">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>

        <div class="emoji-picker" id="emojiPicker">
            <span onclick="addEmoji('😀')">😀</span>
            <span onclick="addEmoji('😂')">😂</span>
            <span onclick="addEmoji('🥰')">🥰</span>
            <span onclick="addEmoji('😎')">😎</span>
            <span onclick="addEmoji('🤔')">🤔</span>
            <span onclick="addEmoji('🙄')">🙄</span>
            <span onclick="addEmoji('👍')">👍</span>
            <span onclick="addEmoji('👎')">👎</span>
            <span onclick="addEmoji('🙌')">🙌</span>
            <span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('💔')">💔</span>
        </div>
    </div>
</div>

<script>
    const API_URL = 'TU_URL_DE_APPS_SCRIPT_AQUI'; 
    
    const chatBox = document.getElementById('chatBox');
    const messageInput = document.getElementById('messageInput');
    const currentUserSelect = document.getElementById('currentUser');
    const emojiPicker = document.getElementById('emojiPicker');

    let lastMessageCount = 0;
    let initialLoad = true;
    let myCurrentState = 'active'; // Por defecto estamos activos

    // --- DETECCIÓN DE PESTAÑA ACTIVA/INACTIVA ---
    document.addEventListener('visibilitychange', () => {
        myCurrentState = document.hidden ? 'away' : 'active';
        sendHeartbeat(); // Enviamos el cambio de estado inmediatamente
    });

    // --- LÓGICA DE EMOJIS ---
    function toggleEmojiPicker() {
        emojiPicker.classList.toggle('show');
    }
    function addEmoji(emoji) {
        messageInput.value += emoji;
        messageInput.focus();
        emojiPicker.classList.remove('show');
    }

    // --- NOTIFICACIONES ---
    function requestNotificationPermission() {
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") alert("Notificaciones activadas. Recibirás avisos si minimizas la ventana.");
            });
        }
    }

    function notifyNewMessage(sender, text) {
        if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
            new Notification(`Mensaje de ${sender}`, {
                body: text,
                icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png"
            });
        }
    }

    // --- CARGA DE DATOS ---
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            updateStatus('Rodrigo', data.status.Rodrigo);
            updateStatus('Noelia', data.status.Noelia);

            const messages = data.messages;
            if (messages.length !== lastMessageCount) {
                chatBox.innerHTML = '';
                const currentUser = currentUserSelect.value;

                messages.forEach((msg, index) => {
                    const isSentByMe = msg.sender === currentUser;
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${isSentByMe ? 'sent' : 'received'}`;
                    msgDiv.setAttribute('data-sender', msg.sender);
                    
                    msgDiv.innerHTML = `
                        <span class="msg-sender">${msg.sender}</span>
                        <span>${msg.text}</span>
                        <span class="msg-time">${msg.timestamp}</span>
                    `;
                    chatBox.appendChild(msgDiv);

                    if (!initialLoad && index >= lastMessageCount && !isSentByMe) {
                        notifyNewMessage(msg.sender, msg.text);
                    }
                });

                chatBox.scrollTop = chatBox.scrollHeight;
                lastMessageCount = messages.length;
                initialLoad = false;
            }
        } catch (error) {
            console.error('Error cargando datos:', error);
        }
    }

    // --- INTERFAZ DE ESTADO ---
    function updateStatus(user, state) {
        const dot = document.getElementById(`dot-${user}`);
        const txt = document.getElementById(`txt-${user}`);
        
        dot.className = 'dot'; // Reiniciar clases
        
        if (state === 'active') {
            dot.classList.add('active');
            txt.innerText = 'On';
            txt.style.color = 'var(--status-online)';
        } else if (state === 'away') {
            dot.classList.add('away');
            txt.innerText = 'Ausente';
            txt.style.color = 'var(--status-away)';
        } else {
            txt.innerText = 'Off';
            txt.style.color = 'var(--text-muted)';
        }
    }

    // --- ENVÍO DE DATOS ---
    async function sendHeartbeat() {
        const sender = currentUserSelect.value;
        const params = new URLSearchParams();
        params.append('action', 'heartbeat');
        params.append('sender', sender);
        params.append('state', myCurrentState); // Enviamos si estamos "active" o "away"
        fetch(API_URL, { method: 'POST', body: params }).catch(()=>console.log("Heartbeat falló"));
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;

        const sender = currentUserSelect.value;
        messageInput.value = '';
        emojiPicker.classList.remove('show'); // Cerrar panel de emojis si estaba abierto

        const msgDiv = document.createElement('div');
        msgDiv.className = `message sent`;
        msgDiv.setAttribute('data-sender', sender);
        msgDiv.innerHTML = `<span class="msg-sender">${sender}</span><span>${text}</span><span class="msg-time">Enviando...</span>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const params = new URLSearchParams();
            params.append('action', 'send');
            params.append('sender', sender);
            params.append('text', text);

            await fetch(API_URL, { method: 'POST', body: params });
            loadData();
        } catch (error) {
            msgDiv.querySelector('.msg-time').innerText = 'Error';
            msgDiv.querySelector('.msg-time').style.color = '#ff7b72';
        }
    }

    function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }

    // --- CICLOS ---
    setInterval(loadData, 3000);
    setInterval(sendHeartbeat, 5000);
    
    // Iniciar
    sendHeartbeat();
    loadData();

    currentUserSelect.addEventListener('change', () => {
        lastMessageCount = 0; 
        initialLoad = true;
        loadData();
    });
</script>

</body>
</html>
